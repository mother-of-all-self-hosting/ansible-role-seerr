---
- name: Verify Seerr systemd service
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Wait for Seerr service to become active (up to 180s)
      ansible.builtin.systemd:
        name: seerr.service
      register: seerr_service
      until: seerr_service.status.ActiveState == 'active'
      retries: 36
      delay: 5

    - name: Assert Seerr service is active
      ansible.builtin.assert:
        that: seerr_service.status.ActiveState == 'active'
        fail_msg: "seerr.service not active ({{ seerr_service.status.ActiveState }})"
        success_msg: "seerr.service is active"

    - name: Retrieve Seerr service log for debugging
      when: seerr_debug_service_enabled | bool
      ansible.builtin.command:
        cmd: journalctl -xeu seerr.service
      changed_when: false

    - name: Wait for Seerr HTTP endpoint to respond (up to 10m)
      ansible.builtin.uri:
        url: "http://localhost:5055/setup"
        method: GET
        status_code: [200, 302]
        follow_redirects: none
      register: seerr_endpoint
      until: seerr_endpoint.status in [200, 302]
      retries: 120
      delay: 5

    - name: Assert Seerr HTTP endpoint responds
      ansible.builtin.assert:
        that: seerr_endpoint.status in [200, 302]
        fail_msg: "Seerr did not respond as expected ({{ seerr_endpoint.status | default('no response') }})"
        success_msg: "Seerr responded with {{ seerr_endpoint.status }}"

    - name: Show Seerr systemd service status summary
      ansible.builtin.debug:
        msg:
          - "Seerr systemd: {{ seerr_service.status.ActiveState }}"
          - "Seerr HTTP: {{ seerr_endpoint.status }}"
